name: Docs

on:
  push:
    branches:
      - main
      - develop
    paths:
      - docs/**
      - mkdocs.yml
      - README.md
      - README-containers.md
      - CHANGELOG.md
      - SECURITY.md
      - index.md
      - data/**/*.md
      - ci/**/*.md
      - examples/**/*.md
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - docs/**
      - mkdocs.yml
      - README.md
      - README-containers.md
      - CHANGELOG.md
      - SECURITY.md
      - index.md
      - data/**/*.md
      - ci/**/*.md
      - examples/**/*.md
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install MkDocs Material
        run: |
          set -eux
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt

      - name: Build site (strict)
        run: |
          set -eux
          mkdocs build --strict --site-dir site

      - name: Upload Pages artifact
        if: |
          github.event_name != 'pull_request' &&
          github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build
    runs-on: ubuntu-latest
    # Match actions/deploy-pages README: token scopes for this job only.
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Verify GitHub Pages uses Actions (REST build_type)
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const settingsUrl = `https://github.com/${owner}/${repo}/settings/pages`;
            let pages;
            try {
              ({ data: pages } = await github.rest.repos.getPages({ owner, repo }));
            } catch (err) {
              const status = err.status ?? err.response?.status;
              if (status === 404) {
                core.setFailed(
                  [
                    `GitHub Pages has no site record yet for ${owner}/${repo} (GET /repos/${owner}/${repo}/pages returned 404).`,
                    'The API only returns data after you save Pages settings at least once.',
                    'Fix: open the link below → Build and deployment → Source → choose "GitHub Actions" → Save.',
                    '',
                    settingsUrl,
                    ''
                  ].join('\n')
                );
                return;
              }
              throw err;
            }
            const buildType = pages.build_type;
            core.info(`GitHub Pages build_type from API: ${buildType ?? 'null'}`);
            if (buildType !== 'workflow') {
              core.setFailed(
                [
                  `Pages publishing source must be GitHub Actions (REST build_type must be "workflow", got ${JSON.stringify(buildType)}).`,
                  'Fix: open the link below → set Source to GitHub Actions (not "Deploy from a branch") → Save → re-run this workflow.',
                  '',
                  settingsUrl,
                  ''
                ].join('\n')
              );
            }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
