name: Quality Checks

on:
  push:
  pull_request:

jobs:
  shell-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install quality tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Run shell quality checks
        run: ./scripts/ci-quality-checks.sh
